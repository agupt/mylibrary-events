# Fly.io config for mylibrary-events.com
#
# First deploy:
#   fly auth login
#   fly launch --copy-config --no-deploy   # creates the app, keeps this file
#   fly deploy
#   fly certs add mylibrary-events.com     # then CNAME via Cloudflare (DNS-only
#                                          # while cert validates, orange-cloud after)
#
# AdSense: both values below are the same public publisher id in two
# spellings. The client id is a BUILD arg (Next inlines NEXT_PUBLIC_* at
# build time); the ads.txt id is read at runtime by src/app/ads.txt/route.ts.

app = "mylibrary-events"
primary_region = "sjc"

[build]
  [build.args]
    NEXT_PUBLIC_ADSENSE_CLIENT = "ca-pub-9216109025053274"

[env]
  ADSENSE_PUBLISHER_ID = "pub-9216109025053274"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep one machine warm: the in-memory feed cache is the first cache
  # layer, and cold machines pay slow-vendor fetches (Dallas ~46s).
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "feed_cache"
  destination = "/app/.cache"
  # Create once: fly volumes create feed_cache --size 1 --region sjc
