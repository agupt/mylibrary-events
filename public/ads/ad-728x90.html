<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>MyBlueBerry ad — 728x90</title><style>html,body{width:728px;height:90px;background:transparent}
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --text:#EFECE6; --dim:#8A8DA0; --accent:#E8A99A; --ink:#1A1109; --safe:#5FB584;
    --serif:'Fraunces',Georgia,'Times New Roman',serif;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  }
  a.ad{display:block;position:relative;overflow:hidden;text-decoration:none;color:var(--text);
    background:linear-gradient(158deg,#1B2030 0%,#141824 46%,#0F1219 100%);
    border:1px solid rgba(255,255,255,0.07);border-radius:16px;
    box-shadow:0 10px 34px -12px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
    font-family:var(--mono);-webkit-font-smoothing:antialiased}
  .glow{position:absolute;pointer-events:none;
    background:radial-gradient(closest-side,rgba(232,169,154,0.22),transparent 70%);
    animation:breathe 8s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1) translate(0,0);opacity:.85}
    50%{transform:scale(1.18) translate(-6%,4%);opacity:1}}
  .brand{display:flex;align-items:center;gap:8px;animation:rise .7s cubic-bezier(.2,.7,.2,1) both}
  .brand img{border-radius:24%;display:block}
  .wm{font-family:var(--serif);font-weight:600;letter-spacing:-.01em}
  .ey{font-family:var(--mono);text-transform:uppercase;letter-spacing:.16em;color:var(--dim)}
  h1{font-family:var(--serif);font-weight:600;line-height:1.04;letter-spacing:-.02em}
  h1 .hl{color:var(--accent)}
  @keyframes rise{0%{opacity:0;transform:translateY(7px)}100%{opacity:1;transform:translateY(0)}}
  .rotor{position:relative}
  .rotor span{position:absolute;inset:0;color:var(--dim);opacity:0}
  .cta{position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:6px;
    background:var(--accent);color:var(--ink);font-weight:700;border-radius:999px;white-space:nowrap;
    animation:nudge 4.5s ease-in-out infinite}
  @keyframes nudge{0%,88%,100%{transform:translateY(0)}94%{transform:translateY(-2px)}}
  .cta::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.45),transparent);
    transform:skewX(-18deg);animation:sheen 4.5s ease-in-out infinite}
  @keyframes sheen{0%,70%{left:-60%}85%{left:130%}100%{left:130%}}
  .dnc{display:inline-flex;align-items:center;gap:6px;color:var(--dim)}
  .dnc .dot{width:6px;height:6px;border-radius:50%;background:var(--safe);
    animation:pulse 3s ease-out infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(95,181,132,.55)}70%,100%{box-shadow:0 0 0 7px rgba(95,181,132,0)}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}.rotor span:first-child{opacity:1}}
